workflows:
  android-workflow:
    name: Android APK Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Build Android APK using Gradle 9.3.1
        script: |
          sdk use java 21.0.2-open || true
          wget https://services.gradle.org/distributions/gradle-9.3.1-bin.zip -P /tmp
          sudo unzip -o -d /opt/gradle /tmp/gradle-9.3.1-bin.zip
          /opt/gradle/gradle-9.3.1/bin/gradle assembleDebug
    artifacts:
      - app/build/outputs/apk/**/*.apk
